name: DealFinder Scraper

on:
  schedule:
    - cron: '*/20 * * * *'  # každých 20 minút
  workflow_dispatch:          # manuálne spustenie tlačidlom

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper (one cycle)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DB_PATH: dealfinder.db
          SCRAPE_INTERVAL_SEC: 0
        run: python runner.py --once