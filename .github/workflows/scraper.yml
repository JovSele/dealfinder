name: DealFinder Scraper

on:
  schedule:
    - cron: '0 * * * *'
    - cron: "0 8 * * 0"         # každú nedeľu o 8:00 — weekly summary
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download DB artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          name: dealfinder-db
          path: .
        continue-on-error: true  # prvý beh nemá artifact

      - name: Run scraper
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID }}
          TELEGRAM_FREE_CHAT_ID: ${{ vars.TELEGRAM_FREE_CHAT_ID }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ vars.TELEGRAM_ADMIN_CHAT_ID }}
          DB_PATH: dealfinder.db
        run: python runner.py --once

      - name: Upload DB artifact
        uses: actions/upload-artifact@v4
        with:
          name: dealfinder-db
          path: dealfinder.db
          retention-days: 14

  weekly-summary:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '0 8 * * 0'
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download DB artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          name: dealfinder-db
          path: .
        continue-on-error: true

      - name: Run weekly summary
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_FREE_CHAT_ID: ${{ vars.TELEGRAM_FREE_CHAT_ID }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ vars.TELEGRAM_ADMIN_CHAT_ID }}
        run: python runner.py --weekly
