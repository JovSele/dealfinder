version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: dealfinder
      POSTGRES_USER: dealfinder
      POSTGRES_PASSWORD: dealfinder123
      TZ: Europe/Prague
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  scraper:
    build: .
    restart: always
    depends_on:
      - postgres
    env_file: .env
    command: python -u runner.py --loop
    environment:
      - TZ=Europe/Prague

  bot:
    build: .
    restart: always
    depends_on:
      - postgres
    env_file: .env
    command: python bot.py
    environment:
      - TZ=Europe/Prague

volumes:
  postgres_data: